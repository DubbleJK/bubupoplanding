name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  lint-and-build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Use Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Build
        run: npm run build
        env:
          # 빌드 시 getSiteUrl() 폴백용 (프로덕션은 Vercel에서 NEXT_PUBLIC_SITE_URL 설정)
          NEXT_PUBLIC_SITE_URL: https://bubupoplanding.vercel.app
